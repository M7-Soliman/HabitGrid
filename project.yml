# xcodegen spec — defines the Xcode project so we can (re)generate it from the CLI
# instead of hand-editing in Xcode. Run `xcodegen generate` to (re)build HabitGrid.xcodeproj.
name: HabitGrid

# Signing (DEVELOPMENT_TEAM) lives in signing.local.yml — gitignored, not in this public
# repo. Copy signing.local.example.yml to signing.local.yml and add your Team ID.
include:
  - signing.local.yml

options:
  bundleIdPrefix: com.m7soliman
  deploymentTarget:
    iOS: "17.0"          # iOS 17+ so we can use SwiftData later

# Local Swift package: our pure-logic core (models + grid + streaks).
packages:
  HabitCore:
    path: Packages/HabitCore

targets:
  HabitGrid:
    type: application
    platform: iOS
    sources:
      - App                # app-only Swift files
      - Shared             # code shared with the widget (models, store, grid view, theme)
    dependencies:
      - package: HabitCore # the app imports HabitCore
      - target: HabitWidgetExtension   # embed the widget in the app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.m7soliman.HabitGrid
        GENERATE_INFOPLIST_FILE: YES        # let Xcode synthesize Info.plist
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"          # iPhone only
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon   # use App/Assets.xcassets/AppIcon
        CODE_SIGN_ENTITLEMENTS: App/HabitGrid.entitlements
        INFOPLIST_FILE: App/Info.plist                # registers the habitgrid:// URL scheme

  HabitWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - Widget             # widget-only Swift files + Info.plist
      - Shared             # shared models, store, grid view, theme
    dependencies:
      - package: HabitCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.m7soliman.HabitGrid.widget
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Widget/Info.plist
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: Widget/HabitWidget.entitlements
        SWIFT_VERSION: "5.9"
